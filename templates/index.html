<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Tumor Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-container { margin-top: 50px; max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { color: #2c3e50; font-weight: bold; margin-bottom: 20px; }
        .btn-predict { background-color: #0d6efd; color: white; width: 100%; padding: 10px; font-size: 18px; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; text-align: center; font-size: 24px; font-weight: bold; }
        .result-safe { background-color: #d1e7dd; color: #0f5132; }
        .result-danger { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center">
    <div class="main-container text-center">
        <h1 class="header-title">🧠 Brain Tumor Detection</h1>
        <p class="text-muted">Upload an MRI Scan to detect anomalies</p>
        
        <form action="/" method="post" enctype="multipart/form-data">
            <div class="mb-4">
                <input class="form-control" type="file" name="file" accept="image/*" required>
            </div>
            <button type="submit" class="btn btn-predict">Analyze MRI Scan</button>
        </form>

        {% if prediction %}
        <div class="result-box {{ 'result-danger' if 'Tumor' in prediction else 'result-safe' }}">
            {{ prediction }}
        </div>
        <div class="mt-3">
            <img src="{{ img_path }}" alt="Uploaded Image" style="max-width: 100%; border-radius: 10px;">
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
